<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-theme="light">

    <div class="wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-brand">
                    <i class="bi bi-hexagon-fill"></i>
                    <span>SaaS Admin</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item">
                    <a href="index.html" class="nav-link">
                        <i class="bi bi-grid-1x2"></i> Overview
                    </a>
                </div>
                <div class="nav-item active">
                    <a href="analytics.html" class="nav-link">
                        <i class="bi bi-graph-up"></i> Analytics
                    </a>
                </div>
                <div class="nav-item">
                    <a href="users.html" class="nav-link">
                        <i class="bi bi-people"></i> Users
                    </a>
                </div>
                <div class="nav-item">
                    <a href="orders.html" class="nav-link">
                        <i class="bi bi-cart3"></i> Orders
                    </a>
                </div>
                <div class="nav-item">
                    <a href="settings.html" class="nav-link">
                        <i class="bi bi-gear"></i> Settings
                    </a>
                </div>
            </div>
            <div class="sidebar-footer">
                <a href="#" class="nav-link text-danger" onclick="window.API.logout()">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="toggle-sidebar" id="toggle-sidebar">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="search-bar">
                        <i class="bi bi-search"></i>
                        <input type="text" placeholder="Search analytics...">
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="topbar-icon" id="theme-toggle">
                        <i class="bi bi-moon"></i>
                    </button>
                    <button class="topbar-icon">
                        <i class="bi bi-bell"></i>
                    </button>
                    <div class="dropdown">
                        <div class="user-profile" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff"
                                alt="User" class="user-avatar">
                        </div>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="settings.html">Profile</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="window.API.logout()">Logout</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header">
                    <h1 class="page-title">Analytics</h1>
                    <div>
                        <select class="form-select w-auto d-inline-block me-2">
                            <option>Last 7 Days</option>
                            <option>Last 30 Days</option>
                            <option>This Year</option>
                        </select>
                        <button class="btn btn-outline-primary">
                            <i class="bi bi-file-earmark-arrow-down"></i> Export
                        </button>
                    </div>
                </div>

                <div class="row g-4 mt-2">
                    <div class="col-12 col-md-8">
                        <div class="card h-100">
                            <div class="card-header">
                                <h5 class="mb-0">Traffic Sessions</h5>
                            </div>
                            <div class="card-body">
                                <div style="height: 350px;"><canvas id="trafficChart"></canvas></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-md-4">
                        <div class="card h-100">
                            <div class="card-header">
                                <h5 class="mb-0">Device Breakdown</h5>
                            </div>
                            <div class="card-body d-flex align-items-center justify-content-center">
                                <div style="height: 250px; width: 100%;"><canvas id="deviceChart"></canvas></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-lg-6">
                        <div class="card h-100">
                            <div class="card-header">
                                <h5 class="mb-0">User Retention</h5>
                            </div>
                            <div class="card-body">
                                <div style="height: 300px;"><canvas id="retentionChart"></canvas></div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-lg-6">
                        <div class="card h-100">
                            <div class="card-header">
                                <h5 class="mb-0">Top Performing Pages</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0 border-divider">
                                        <thead>
                                            <tr>
                                                <th class="ps-4">Page Path</th>
                                                <th>Views</th>
                                                <th>Bounce Rate</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td class="ps-4 text-primary">/app/dashboard</td>
                                                <td>45,210</td>
                                                <td>23.4%</td>
                                            </tr>
                                            <tr>
                                                <td class="ps-4 text-primary">/pricing</td>
                                                <td>20,105</td>
                                                <td>45.2%</td>
                                            </tr>
                                            <tr>
                                                <td class="ps-4 text-primary">/blog/top-10-tips</td>
                                                <td>15,920</td>
                                                <td>60.1%</td>
                                            </tr>
                                            <tr>
                                                <td class="ps-4 text-primary">/contact</td>
                                                <td>5,200</td>
                                                <td>10.0%</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/charts.js"></script>
</body>

</html>
