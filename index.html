<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Overview</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="light">

    <div class="wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-brand">
                    <i class="bi bi-hexagon-fill"></i>
                    <span>Nova Admin</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item active">
                    <a href="index.html" class="nav-link">
                        <i class="bi bi-grid-1x2"></i> Overview
                    </a>
                </div>
                <div class="nav-item">
                    <a href="analytics.html" class="nav-link">
                        <i class="bi bi-graph-up"></i> Analytics
                    </a>
                </div>
                <div class="nav-item">
                    <a href="users.html" class="nav-link">
                        <i class="bi bi-people"></i> Users
                    </a>
                </div>
                <div class="nav-item">
                    <a href="orders.html" class="nav-link">
                        <i class="bi bi-cart3"></i> Orders
                    </a>
                </div>
                <div class="nav-item">
                    <a href="settings.html" class="nav-link">
                        <i class="bi bi-gear"></i> Settings
                    </a>
                </div>
            </div>
            <div class="sidebar-footer">
                <a href="#" class="nav-link text-danger" onclick="window.API.logout()">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="toggle-sidebar" id="toggle-sidebar">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="search-bar">
                        <i class="bi bi-search"></i>
                        <input type="text" placeholder="Search anything...">
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="topbar-icon" id="theme-toggle">
                        <i class="bi bi-moon"></i>
                    </button>
                    <button class="topbar-icon">
                        <i class="bi bi-bell"></i>
                        <span class="badge-indicator"></span>
                    </button>
                    <div class="dropdown">
                        <div class="user-profile" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff" alt="User" class="user-avatar">
                        </div>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><h6 class="dropdown-header" id="dropdown-user-name">Admin User</h6></li>
                            <li><a class="dropdown-item" href="settings.html"><i class="bi bi-person me-2"></i>Profile</a></li>
                            <li><a class="dropdown-item" href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="window.API.logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                <div class="page-header">
                    <h1 class="page-title">Dashboard Overview</h1>
                    <button class="btn btn-primary">
                        <i class="bi bi-cloud-download me-2"></i> Generate Report
                    </button>
                </div>

                <!-- Stats Row -->
                <div class="row g-4 mb-4" id="stats-container">
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="card-stats skeleton">
                            <div class="card-icon skeleton" style="background:#ddd; color:transparent"></div>
                            <div class="card-info" style="width:100%">
                                <div class="skeleton-text"></div>
                                <div class="skeleton-title"></div>
                            </div>
                        </div>
                    </div>
                    <!-- Skeletons will be replaced by JS -->
                </div>

                <div class="row g-4">
                    <div class="col-12 col-lg-8">
                        <div class="card h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">Revenue Overview</h5>
                                <select class="form-select w-auto form-select-sm">
                                    <option>This Week</option>
                                    <option>This Month</option>
                                    <option>This Year</option>
                                </select>
                            </div>
                            <div class="card-body">
                                <div style="height: 300px;">
                                    <canvas id="revenueChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-lg-4">
                        <div class="card h-100">
                            <div class="card-header">
                                <h5 class="mb-0">Recent Users</h5>
                            </div>
                            <div class="card-body p-0" id="recent-users-container">
                                <!-- Populated by JS -->
                                <div class="p-3 text-center text-muted">Loading...</div>
                            </div>
                            <div class="card-footer text-center">
                                <a href="users.html" class="text-primary fw-medium">View All Users <i class="bi bi-arrow-right"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Check auth happens in app.js
            
            // Set User name
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            if(user.name) {
                document.getElementById('dropdown-user-name').innerText = user.name;
            }

            // Load Stats
            try {
                const stats = await API.getDashboardStats();
                const statsHtml = `
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="card-stats">
                            <div class="card-icon"><i class="bi bi-currency-dollar"></i></div>
                            <div class="card-info"><h6>Total Revenue</h6><h3>${stats.totalRevenue}</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="card-stats">
                            <div class="card-icon" style="background: rgba(16, 185, 129, 0.1); color: var(--success-color);"><i class="bi bi-people"></i></div>
                            <div class="card-info"><h6>Active Users</h6><h3>${stats.activeUsers}</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="card-stats">
                            <div class="card-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--warning-color);"><i class="bi bi-cart3"></i></div>
                            <div class="card-info"><h6>Total Orders</h6><h3>${stats.totalOrders}</h3></div>
                        </div>
                    </div>
                    <div class="col-12 col-md-6 col-lg-3">
                        <div class="card-stats">
                            <div class="card-icon" style="background: rgba(239, 68, 68, 0.1); color: var(--danger-color);"><i class="bi bi-graph-up-arrow"></i></div>
                            <div class="card-info"><h6>Growth</h6><h3>${stats.growth}</h3></div>
                        </div>
                    </div>
                `;
                document.getElementById('stats-container').innerHTML = statsHtml;
            } catch (err) {
                console.error(err);
            }

            // Load Recent Users
            try {
                const users = await API.getUsers();
                const recentUsers = users.slice(0, 4);
                let listHtml = '<ul class="list-group list-group-flush">';
                recentUsers.forEach(u => {
                    listHtml += `
                        <li class="list-group-item d-flex align-items-center p-3 border-divider" style="background:transparent; border-color:var(--border-color);">
                            <img src="https://ui-avatars.com/api/?name=${u.name.replace(' ','+')}&background=random" class="rounded-circle me-3" width="40" height="40">
                            <div>
                                <h6 class="mb-0 text-primary">${u.name}</h6>
                                <small class="text-muted">${u.email}</small>
                            </div>
                        </li>
                    `;
                });
                listHtml += '</ul>';
                document.getElementById('recent-users-container').innerHTML = listHtml;
            } catch(err) {
                 document.getElementById('recent-users-container').innerHTML = '<div class="p-3 text-center text-danger">Error loading users.</div>';
            }

            // Init Chart
            initChart();
        });

        let myChart;
        function initChart() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            const style = getComputedStyle(document.body);
            const textColor = style.getPropertyValue('--text-primary');
            const gridColor = style.getPropertyValue('--border-color');
            const primaryColor = style.getPropertyValue('--primary-color').trim();

            if(myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Revenue',
                        data: [1200, 1900, 3000, 5000, 2000, 3000, 4500],
                        borderColor: primaryColor,
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: gridColor },
                            ticks: { color: textColor }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: textColor }
                        }
                    }
                }
            });
        }

        // Re-init chart on theme change
        window.addEventListener('themeChanged', initChart);
    </script>
</body>
</html>
