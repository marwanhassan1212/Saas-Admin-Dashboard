<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--sidebar-bg); /* Use a solid color for auth bg */
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            border-radius: var(--radius-xl);
            background-color: var(--bg-surface);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
        }
        .auth-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .auth-brand i { color: var(--primary-color); font-size: 2rem; }
    </style>
</head>
<body data-theme="light">

    <div class="auth-card">
        <div class="auth-brand">
            <i class="bi bi-hexagon-fill"></i>
            <span>Nova Admin</span>
        </div>
        
        <h4 class="text-center mb-1">Welcome Back</h4>
        <p class="text-center text-muted mb-4">Sign in to your account</p>

        <form id="loginForm">
            <div id="auth-error" class="alert alert-danger d-none" style="font-size: 0.875rem; padding: 0.5rem;"></div>

            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="admin@admin.com" required value="admin@admin.com">
            </div>
            
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center">
                    <label class="form-label mb-0">Password</label>
                    <a href="forgot-password.html" class="text-primary text-decoration-none" style="font-size: 0.875rem;">Forgot Password?</a>
                </div>
                <input type="password" class="form-control mt-2" id="password" placeholder="password" required value="password">
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="loginBtn">
                Sign In
            </button>

            <div class="text-center mt-4 text-muted">
                Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-medium">Sign up</a>
            </div>
        </form>
    </div>

    <!-- Theme toggle floating button -->
    <button class="btn btn-light shadow-sm position-fixed bottom-0 end-0 m-4 rounded-circle" id="theme-toggle" style="width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;">
        <i class="bi bi-moon"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
