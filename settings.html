<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-theme="light">

    <div class="wrapper">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="index.html" class="sidebar-brand">
                    <i class="bi bi-hexagon-fill"></i>
                    <span>SaaS Admin</span>
                </a>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item">
                    <a href="index.html" class="nav-link"><i class="bi bi-grid-1x2"></i> Overview</a>
                </div>
                <div class="nav-item">
                    <a href="analytics.html" class="nav-link"><i class="bi bi-graph-up"></i> Analytics</a>
                </div>
                <div class="nav-item">
                    <a href="users.html" class="nav-link"><i class="bi bi-people"></i> Users</a>
                </div>
                <div class="nav-item">
                    <a href="orders.html" class="nav-link"><i class="bi bi-cart3"></i> Orders</a>
                </div>
                <div class="nav-item active">
                    <a href="settings.html" class="nav-link"><i class="bi bi-gear"></i> Settings</a>
                </div>
            </div>
            <div class="sidebar-footer">
                <a href="#" class="nav-link text-danger" onclick="window.API.logout()"><i class="bi bi-box-arrow-left"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="toggle-sidebar" id="toggle-sidebar"><i class="bi bi-list"></i></button>
                </div>
                <div class="topbar-right">
                    <button class="topbar-icon" id="theme-toggle"><i class="bi bi-moon"></i></button>
                    <div class="dropdown">
                        <div class="user-profile" data-bs-toggle="dropdown">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff" alt="User" class="user-avatar">
                        </div>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="settings.html">Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="#" onclick="window.API.logout()">Logout</a></li>
                        </ul>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <h1 class="page-title mb-4">Settings</h1>

                <div class="row g-4">
                    <div class="col-12 col-lg-4">
                        <div class="card mb-4">
                            <div class="card-body text-center">
                                <img src="https://ui-avatars.com/api/?name=Admin+User&background=4f46e5&color=fff" alt="User" class="rounded-circle mb-3" width="100" height="100">
                                <h5 class="mb-1">Admin User</h5>
                                <p class="text-muted mb-3">admin@admin.com</p>
                                <button class="btn btn-primary btn-sm">Change Avatar</button>
                            </div>
                        </div>
                        
                        <div class="list-group list-group-flush rounded border" style="background-color: var(--bg-surface); border-color: var(--border-color)!important;">
                            <a href="#profile" class="list-group-item list-group-item-action active border-0" data-bs-toggle="list" style="background-color: transparent">General</a>
                            <a href="#security" class="list-group-item list-group-item-action border-0" data-bs-toggle="list" style="background-color: transparent; color: var(--text-primary)">Security</a>
                            <a href="#notifications" class="list-group-item list-group-item-action border-0" data-bs-toggle="list" style="background-color: transparent; color: var(--text-primary)">Notifications</a>
                        </div>
                    </div>

                    <div class="col-12 col-lg-8">
                        <div class="tab-content">
                            <!-- General Settings -->
                            <div class="tab-pane fade show active" id="profile">
                                <div class="card">
                                    <div class="card-header border-divider">
                                        <h5 class="mb-0">General Information</h5>
                                    </div>
                                    <div class="card-body">
                                        <form onsubmit="event.preventDefault(); window.showToast('Profile updated!', 'success');">
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label class="form-label">First Name</label>
                                                    <input type="text" class="form-control" value="Admin">
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label">Last Name</label>
                                                    <input type="text" class="form-control" value="User">
                                                </div>
                                                <div class="col-12">
                                                    <label class="form-label">Email</label>
                                                    <input type="email" class="form-control" value="admin@admin.com" disabled>
                                                    <div class="form-text">Your email address cannot be changed.</div>
                                                </div>
                                                <div class="col-12">
                                                    <label class="form-label">Bio</label>
                                                    <textarea class="form-control" rows="3">Systems administrator.</textarea>
                                                </div>
                                                <div class="col-12 text-end mt-4">
                                                    <button type="submit" class="btn btn-primary">Save Changes</button>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>

                            <!-- Security Settings -->
                            <div class="tab-pane fade" id="security">
                                <div class="card">
                                    <div class="card-header border-divider">
                                        <h5 class="mb-0">Change Password</h5>
                                    </div>
                                    <div class="card-body">
                                        <form onsubmit="event.preventDefault(); window.showToast('Password changed!', 'success');">
                                            <div class="mb-3">
                                                <label class="form-label">Current Password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">New Password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                            <div class="mb-4">
                                                <label class="form-label">Confirm New Password</label>
                                                <input type="password" class="form-control">
                                            </div>
                                            <div class="text-end">
                                                <button type="submit" class="btn btn-primary">Update Password</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>

                            <!-- Notifications Settings -->
                            <div class="tab-pane fade" id="notifications">
                                <div class="card">
                                    <div class="card-header border-divider">
                                        <h5 class="mb-0">Email Notifications</h5>
                                    </div>
                                    <div class="card-body">
                                        <div class="form-check form-switch mb-3">
                                            <input class="form-check-input" type="checkbox" id="notif1" checked>
                                            <label class="form-check-label" for="notif1">New User Registrations</label>
                                        </div>
                                        <div class="form-check form-switch mb-3">
                                            <input class="form-check-input" type="checkbox" id="notif2" checked>
                                            <label class="form-check-label" for="notif2">Weekly Reports</label>
                                        </div>
                                        <div class="form-check form-switch mb-4">
                                            <input class="form-check-input" type="checkbox" id="notif3">
                                            <label class="form-check-label" for="notif3">Security Alerts</label>
                                        </div>
                                        <div class="text-end">
                                            <button class="btn btn-primary" onclick="window.showToast('Preferences set!', 'success')">Save Preferences</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <style>
        /* Custom styles for list group active state specific to this page */
        .list-group-item.active {
            font-weight: 600;
            color: var(--primary-color) !important;
            border-left: 3px solid var(--primary-color) !important;
        }
        .list-group-item:hover {
            color: var(--primary-color) !important;
        }
    </style>
</body>
</html>
